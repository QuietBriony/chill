<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Chill v3.2 - Quiet Piano Radio</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="description" content="Chill: quiet synthetic piano radio and trio listening surface." />
    <meta name="theme-color" content="#101617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Chill" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./style.css?v=pwa-2" />
    <!-- Tone.js CDN (14.7.77 stable, existing dependency only) -->
    <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
  </head>
  <body>
    <canvas id="bg"></canvas>

    <div class="panel">
      <h1>
        Chill v3.2
        <span>Quiet Piano Radio</span>
      </h1>

      <p class="listening-note">
        Synthetic felt piano, quiet voicings, no samples.
      </p>

      <a class="page-link" href="./session.html">Open Quiet Piano Trio / Music SYNC</a>

      <div class="controls">
        <button id="startBtn">▶ START</button>
        <button id="stopBtn">■ STOP</button>
      </div>

      <div class="controls">
        <button id="acidBtn" aria-pressed="false">PULSE</button>
        <button id="autoBtn" aria-pressed="false">AUTO</button>
      </div>

      <p class="mode-note">
        Music SYNC対応。STARTまで無音。PULSE adds a very soft rhythm floor. AUTO only drifts voicing and room.
      </p>

      <div class="reference-row">
        <select id="referenceSelect" aria-label="Reference">
          <option value="piano-jazz-chill">Quiet Piano</option>
          <option value="rainy-lofi-room">Glass Piano</option>
          <option value="soft-solo-drift">Memory Piano</option>
          <option value="soft-melody-piano">Soft Melody</option>
        </select>
        <button id="seedBtn">NEW SEED</button>
      </div>

      <div class="faders">
        <label>
          <span class="fader-name">Touch</span>
          <span class="fader-hint">hammer / brightness</span>
          <input
            type="range"
            id="energy"
            min="0"
            max="1"
            step="0.01"
            value="0.6"
          />
        </label>
        <label>
          <span class="fader-name">Phrase</span>
          <span class="fader-hint">answers / voicing</span>
          <input
            type="range"
            id="creation"
            min="0"
            max="1"
            step="0.01"
            value="0.5"
          />
        </label>
        <label>
          <span class="fader-name">Room</span>
          <span class="fader-hint">space / rest</span>
          <input
            type="range"
            id="nature"
            min="0"
            max="1"
            step="0.01"
            value="0.4"
          />
        </label>
      </div>

      <div class="runtime-status" aria-live="polite">
        <span id="seedLabel">Seed</span>
        <span id="moodLabel">glow</span>
        <span id="modeLabel">ambient</span>
        <span id="guardLabel">stable</span>
      </div>
    </div>

    <script src="./engine.js?v=pwa-2"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch((error) => {
            console.warn("[Chill] service worker registration failed", error);
          });
        });
      }
    </script>
  </body>
</html>
